<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Question Generator</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .ai-wrap {
      max-width: 1100px;
      margin: 30px auto;
      padding: 20px;
    }

    .ai-grid {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 24px;
    }

    .ai-card {
      background: #fff;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    .ai-card h2, .ai-card h3 {
      margin-top: 0;
    }

    .ai-form-row {
      margin-bottom: 16px;
    }

    .ai-form-row label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .ai-form-row input,
    .ai-form-row select,
    .ai-form-row textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font: inherit;
    }

    .ai-form-row textarea {
      min-height: 260px;
      resize: vertical;
    }

    .ai-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .ai-btn {
      border: 0;
      padding: 12px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
    }

    .ai-btn-primary {
      background: #0078d4;
      color: white;
    }

    .ai-btn-secondary {
      background: #e9eef6;
      color: #1f2d3d;
    }

    .ai-message {
      margin-top: 12px;
      font-weight: 600;
    }

    .generated-question {
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
      background: #fafcff;
    }

    .generated-question h4 {
      margin: 0 0 10px;
    }

    .generated-question ul {
      margin: 0;
      padding-left: 20px;
    }

    .correct-option {
      font-weight: 700;
      color: #0f9d58;
    }

    @media (max-width: 900px) {
      .ai-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="ai-wrap">
    <h1>AI Question Generator</h1>
    <p>Paste lecture text and generate multiple-choice questions for your quiz.</p>

    <div class="ai-grid">
      <section class="ai-card">
        <h2>Generate Questions</h2>

        <div class="ai-form-row">
          <label for="topic">Topic</label>
          <input type="text" id="topic" placeholder="e.g. Machine Learning Basics" />
        </div>

        <div class="ai-form-row">
          <label for="difficulty">Difficulty</label>
          <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="medium" selected>Medium</option>
            <option value="hard">Hard</option>
          </select>
        </div>

        <div class="ai-form-row">
          <label for="numberOfQuestions">Number of Questions</label>
          <select id="numberOfQuestions">
            <option value="3">3</option>
            <option value="5" selected>5</option>
            <option value="8">8</option>
            <option value="10">10</option>
          </select>
        </div>

        <div class="ai-form-row">
          <label for="lectureText">Lecture Text / Notes</label>
          <textarea id="lectureText" placeholder="Paste lecture notes, slide text, key concepts, or module content here..."></textarea>
        </div>

        <div class="ai-actions">
          <button id="generateBtn" class="ai-btn ai-btn-primary">Generate Questions</button>
          <button id="clearBtn" class="ai-btn ai-btn-secondary" type="button">Clear</button>
        </div>

        <div id="message" class="ai-message"></div>
      </section>

      <section class="ai-card">
        <h2>Preview</h2>
        <div id="results">
          <p>No generated questions yet.</p>
        </div>
      </section>
    </div>
  </div>

  
  <script>
    requireLecturerLogin();
  </script>
  <script src="ai-question-generator.js"></script>
</body>
</html>
